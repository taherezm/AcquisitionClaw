[build]
  command = "npm run build:netlify"
  publish = ".netlify/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "multer", "pdfjs-dist", "xlsx", "@napi-rs/canvas", "tesseract.js", "serverless-http"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
